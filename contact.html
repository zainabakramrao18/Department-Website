<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Contact Us</title>
</head>

<body bgcolor="#f4f6f7">

<h1>
<img src="images/contact.png" width="30" alt="Contact Icon">
Contact Us
</h1>

<!-- Navigation -->

<form action="#" method="post">

Name: <input type="text" name="name"><br><br>

Email: <input type="text" name="email"><br><br>

Phone: <input type="text" name="phone"><br><br>

Program:
<select name="program">
<option>BS Mathematics</option>
<option>M. Phil Software Engineering</option>
<option>PhD Mathematics</option>
</select>

<br><br>

Gender:
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female

<br><br>

Interests:
<input type="checkbox" name="interest" value="AI"> AI
<input type="checkbox" name="interest" value="Web"> Web Development
<input type="checkbox" name="interest" value="Data"> Data Science

<br><br>

Message:<br>
<textarea name="message" rows="5" cols="40"></textarea>

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
